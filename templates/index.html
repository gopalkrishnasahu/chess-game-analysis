<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Game Analyser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; }
    .form-control, .form-select {
      background: #0f1117; color: #e2e8f0; border-color: #2d3748;
    }
    .form-control:focus, .form-select:focus {
      background: #0f1117; color: #e2e8f0; border-color: #63b3ed; box-shadow: 0 0 0 0.2rem rgba(99,179,237,.25);
    }
    .form-select option { background: #1a1f2e; }
    .btn-primary { background: #2b6cb0; border-color: #2b6cb0; }
    .btn-primary:hover { background: #2c5282; border-color: #2c5282; }
    .chess-icon { font-size: 2.5rem; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg p-4">
          <div class="text-center mb-4">
            <div class="chess-icon">&#9822;</div>
            <h1 class="h3 mt-2 fw-bold">Chess Game Analyser</h1>
            <p class="text-secondary small mb-0">Find your patterns, weaknesses and strengths</p>
          </div>

          <form action="/analyse" method="post">
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Lichess Username</label>
              <input
                type="text" id="username" name="username"
                class="form-control" placeholder="e.g. magnus" required autofocus
                autocomplete="off" spellcheck="false"
              >
            </div>

            <div class="row g-3 mb-4">
              <div class="col-6">
                <label for="games" class="form-label fw-semibold">Games to fetch</label>
                <input
                  type="number" id="games" name="games"
                  class="form-control" value="50" min="10" max="200"
                >
              </div>
              <div class="col-6">
                <label for="perf" class="form-label fw-semibold">Time control</label>
                <select id="perf" name="perf" class="form-select">
                  <option value="rapid" selected>Rapid</option>
                  <option value="blitz">Blitz</option>
                  <option value="bullet">Bullet</option>
                  <option value="classical">Classical</option>
                </select>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                Analyse my games
              </button>
            </div>
          </form>

          <p class="text-center text-secondary small mt-4 mb-0">
            Uses public Lichess data &mdash; no login required.<br>
            Analysis takes ~20&ndash;40 seconds for 50 games.
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
