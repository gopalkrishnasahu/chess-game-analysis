{% extends "base.html" %}

{% block title %}Error &mdash; Chess Game Analyser{% endblock %}

{% block extra_styles %}
<style>
  .error-icon { font-size: 2.8rem; line-height: 1; filter: drop-shadow(0 0 10px rgba(200,168,75,0.4)); }
</style>
{% endblock %}

{% block body %}
<div class="page-centered">
  <div class="inner">
    <div class="glow-wrap">
      <div class="card">
        <div class="card-body text-center" style="padding: 2.4rem 2rem 2rem;">

          <span class="error-icon">&#9888;</span>

          <h2 style="font-size:1.4rem;color:var(--red);margin:.8rem 0 .6rem;">
            Something went wrong
          </h2>

          <p class="small text-muted" style="margin-bottom:1.8rem;line-height:1.7;">{{ msg }}</p>

          <div class="divider"></div>

          <a href="/" class="btn btn-primary btn-full" style="margin-top:1.4rem;font-size:.95rem;padding:.8rem;">
            &larr; Try again
          </a>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
