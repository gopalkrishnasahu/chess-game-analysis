<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error &mdash; Chess Game Analyser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg p-4 text-center">
          <div style="font-size:2.5rem;" class="mb-3">&#9888;</div>
          <h2 class="h5 fw-bold text-danger mb-3">Something went wrong</h2>
          <p class="text-secondary small mb-4">{{ msg }}</p>
          <a href="/" class="btn btn-primary">Try again</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
