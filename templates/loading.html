<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analysing {{ username }} &mdash; Chess Game Analyser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; }
    .progress { background: #2d3748; height: 6px; }
    .progress-bar { background: #63b3ed; transition: width 0.4s ease; }
    #status { font-size: 0.9rem; color: #90cdf4; min-height: 1.4em; }
    .spinner-border { color: #63b3ed; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg p-4 text-center">
          <div class="mb-3" style="font-size:2rem;">&#9822;</div>
          <h2 class="h5 fw-bold mb-1">Analysing <span class="text-info">{{ username }}</span></h2>
          <p class="text-secondary small mb-4">{{ games }} {{ perf }} games &mdash; this takes about 20&ndash;40 seconds</p>

          <div class="d-flex justify-content-center mb-4">
            <div class="spinner-border" role="status" aria-label="Loading"></div>
          </div>

          <div class="progress mb-3">
            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 5%"></div>
          </div>

          <p id="status" class="mb-0">Connecting...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const username = {{ username | tojson }};
    const games    = {{ games | tojson }};
    const perf     = {{ perf | tojson }};
    const statusEl = document.getElementById("status");
    const barEl    = document.getElementById("progress-bar");

    const steps = ["Fetching", "Parsing", "Computing", "Detecting", "Building"];
    let stepIndex = 0;

    function advanceBar() {
      stepIndex = Math.min(stepIndex + 1, steps.length);
      const pct = Math.round((stepIndex / steps.length) * 90) + 5;
      barEl.style.width = pct + "%";
    }

    const url = `/stream?username=${encodeURIComponent(username)}&games=${games}&perf=${perf}`;
    const src = new EventSource(url);

    src.onmessage = function(e) {
      statusEl.textContent = e.data;
      advanceBar();
    };

    src.addEventListener("done", function(e) {
      src.close();
      barEl.style.width = "100%";
      statusEl.textContent = "Done! Loading report...";
      window.location = "/report/" + e.data;
    });

    src.addEventListener("error", function(e) {
      src.close();
      const msg = e.data || "Connection lost. Please try again.";
      window.location = "/error?msg=" + encodeURIComponent(msg);
    });

    src.onerror = function() {
      if (src.readyState === EventSource.CLOSED) return;
      src.close();
      window.location = "/error?msg=" + encodeURIComponent("Connection lost. Please try again.");
    };
  </script>
</body>
</html>
